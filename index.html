<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 Rabbit World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(160deg, #e8f5e9, #f3e5f5);
  min-height: 100vh;
  overflow: hidden;
  cursor: none;
  font-family: 'Segoe UI', sans-serif;
}
.hint {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.7); padding: 10px 22px; border-radius: 50px;
  font-size: 14px; color: #7c5cbf; backdrop-filter: blur(6px);
  pointer-events: none; z-index: 999;
}
/* === CURSOR RABBIT === */
#cursor-rabbit {
  position: fixed; pointer-events: none; z-index: 1000;
  font-size: 28px; transform: translate(-50%, -50%);
  transition: transform 0.05s linear;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
/* === POP RABBIT === */
.pop-rabbit {
  position: fixed; pointer-events: none; z-index: 900;
  font-size: 26px;
  animation: popUp 1.2s ease-out forwards;
}
@keyframes popUp {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 1; }
  40%  { transform: translate(-50%,-120%) scale(1.3) rotate(10deg); opacity: 1; }
  70%  { transform: translate(-50%,-150%) scale(1) rotate(-5deg); opacity: 1; }
  100% { transform: translate(-50%,-220%) scale(0.8) rotate(0deg); opacity: 0; }
}
/* === RUNNING RABBIT === */
.run-rabbit {
  position: fixed; pointer-events: none; z-index: 800;
  font-size: 32px;
  animation: runAcross var(--dur) linear forwards;
}
@keyframes runAcross {
  0%   { transform: translateX(0) scaleX(var(--dir)); opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { transform: translateX(var(--dist)) scaleX(var(--dir)); opacity: 0; }
}
/* grass decoration */
.grass {
  position: fixed; bottom: 0; left: 0; width: 100%;
  font-size: 28px; letter-spacing: -4px;
  pointer-events: none; opacity: 0.4;
  z-index: 0;
}
</style>
</head>
<body>
<div class="hint">🐰 Gerak mouse • Klik untuk pop • Rabbit berlari sendiri!</div>
<div id="cursor-rabbit">🐰</div>
<div class="grass">🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱🌿🌱🌿🌿🌱</div>

<script>
const cursor = document.getElementById('cursor-rabbit');
const popEmojis = ['🐰','🐇','🐾','✨','💨','🌸','⭐'];
const runEmojis = ['🐇','🐰'];
let mx = window.innerWidth/2, my = window.innerHeight/2;
let cx = mx, cy = my;

// smooth cursor follow
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animCursor() {
  cx += (mx - cx) * 0.18;
  cy += (my - cy) * 0.18;
  cursor.style.left = cx + 'px';
  cursor.style.top = cy + 'px';
  // tilt based on movement direction
  const dx = mx - cx;
  cursor.style.transform = `translate(-50%,-50%) scaleX(${dx < -1 ? -1 : 1})`;
  requestAnimationFrame(animCursor);
}
animCursor();

// pop on click
document.addEventListener('click', e => {
  for (let i = 0; i < 4; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'pop-rabbit';
      el.textContent = popEmojis[Math.floor(Math.random() * popEmojis.length)];
      const ox = (Math.random() - 0.5) * 60;
      el.style.left = (e.clientX + ox) + 'px';
      el.style.top = e.clientY + 'px';
      el.style.fontSize = (18 + Math.random() * 18) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 80);
  }
});

// running rabbits
function spawnRunner() {
  const el = document.createElement('div');
  el.className = 'run-rabbit';
  el.textContent = runEmojis[Math.floor(Math.random() * runEmojis.length)];
  const goRight = Math.random() > 0.5;
  const y = 60 + Math.random() * (window.innerHeight - 120);
  const dur = 3 + Math.random() * 4;
  el.style.setProperty('--dur', dur + 's');
  if (goRight) {
    el.style.left = '-60px';
    el.style.setProperty('--dist', (window.innerWidth + 120) + 'px');
    el.style.setProperty('--dir', '1');
  } else {
    el.style.left = (window.innerWidth + 60) + 'px';
    el.style.setProperty('--dist', '-' + (window.innerWidth + 120) + 'px');
    el.style.setProperty('--dir', '-1');
  }
  el.style.top = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
  setTimeout(spawnRunner, 1500 + Math.random() * 3000);
}
spawnRunner();
</script>
</body>
</html>
